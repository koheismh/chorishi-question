<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>調理師試験 模擬問題</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            background: #f5f5f5;
            color: #333;
            min-height: 100vh;
            -webkit-text-size-adjust: 100%;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
        }

        /* ヘッダー */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 16px;
            text-align: center;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .header h1 {
            font-size: 1.4rem;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 0.85rem;
            opacity: 0.9;
        }

        /* モード選択画面 */
        .mode-selection {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .mode-btn {
            display: flex;
            align-items: center;
            gap: 14px;
            background: white;
            border: none;
            border-radius: 12px;
            padding: 20px;
            text-align: left;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: transform 0.15s, box-shadow 0.15s;
            -webkit-tap-highlight-color: transparent;
        }

        .mode-btn:active {
            transform: scale(0.98);
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }

        .mode-icon {
            font-size: 2rem;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            flex-shrink: 0;
        }

        .mode-icon.exam { background: #e8f5e9; }
        .mode-icon.random { background: #e3f2fd; }
        .mode-icon.weak { background: #fce4ec; }

        .mode-info h3 {
            font-size: 1.05rem;
            margin-bottom: 4px;
        }

        .mode-info p {
            font-size: 0.8rem;
            color: #666;
        }

        .weak-count {
            background: #ff5252;
            color: white;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 8px;
        }

        /* 問題画面 */
        .quiz-screen {
            display: none;
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            -webkit-tap-highlight-color: transparent;
        }

        .back-btn:active {
            background: #eee;
        }

        .progress-info {
            font-size: 0.85rem;
            color: #666;
        }

        .category-badge {
            display: inline-block;
            background: #667eea;
            color: white;
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 20px;
            margin-bottom: 12px;
        }

        .question-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 16px;
        }

        .question-text {
            font-size: 1rem;
            line-height: 1.7;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .choices {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .choice-btn {
            display: block;
            width: 100%;
            text-align: left;
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 14px 16px;
            font-size: 0.95rem;
            line-height: 1.5;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .choice-btn:active {
            background: #e9ecef;
        }

        .choice-btn.selected {
            border-color: #667eea;
            background: #f0f0ff;
        }

        .choice-btn.correct {
            border-color: #4caf50;
            background: #e8f5e9;
        }

        .choice-btn.incorrect {
            border-color: #f44336;
            background: #ffebee;
        }

        .choice-btn.show-correct {
            border-color: #4caf50;
            background: #e8f5e9;
        }

        .choice-btn:disabled {
            cursor: default;
        }

        /* 解説 */
        .explanation {
            display: none;
            background: #fffde7;
            border: 1px solid #fff9c4;
            border-radius: 10px;
            padding: 16px;
            margin-top: 16px;
        }

        .explanation h4 {
            font-size: 0.85rem;
            color: #f57f17;
            margin-bottom: 8px;
        }

        .explanation p {
            font-size: 0.9rem;
            line-height: 1.6;
        }

        /* ボタン */
        .next-btn {
            display: none;
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 16px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
            -webkit-tap-highlight-color: transparent;
        }

        .next-btn:active {
            opacity: 0.9;
        }

        /* 結果画面 */
        .result-screen {
            display: none;
            text-align: center;
        }

        .result-card {
            background: white;
            border-radius: 12px;
            padding: 30px 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }

        .result-score {
            font-size: 3rem;
            font-weight: 700;
            color: #667eea;
            margin: 16px 0;
        }

        .result-score span {
            font-size: 1.2rem;
            color: #666;
        }

        .result-detail {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 8px;
        }

        .result-pass {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 600;
            margin-top: 12px;
        }

        .result-pass.pass {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .result-pass.fail {
            background: #ffebee;
            color: #c62828;
        }

        .result-category {
            text-align: left;
            margin-top: 20px;
        }

        .result-category h4 {
            font-size: 0.9rem;
            margin-bottom: 10px;
            color: #333;
        }

        .category-result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 0.85rem;
        }

        .category-result-item .bar-wrapper {
            width: 100px;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            overflow: hidden;
            margin-left: 10px;
        }

        .category-result-item .bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s;
        }

        .retry-btn, .home-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 10px;
            -webkit-tap-highlight-color: transparent;
        }

        .retry-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .home-btn {
            background: white;
            color: #333;
            border: 2px solid #e0e0e0;
        }

        /* 統計 */
        .stats-section {
            margin-top: 20px;
            background: white;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .stats-section h3 {
            font-size: 0.9rem;
            margin-bottom: 12px;
            color: #333;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 0.85rem;
            border-bottom: 1px solid #f5f5f5;
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .reset-btn {
            display: block;
            width: 100%;
            margin-top: 16px;
            padding: 12px;
            background: #ffebee;
            color: #c62828;
            border: none;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        /* 問題数選択モーダル */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 16px;
            padding: 24px;
            width: 90%;
            max-width: 340px;
        }

        .modal h3 {
            text-align: center;
            margin-bottom: 16px;
        }

        .modal-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .modal-option {
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            font-size: 1rem;
            -webkit-tap-highlight-color: transparent;
        }

        .modal-option:active {
            background: #f0f0ff;
            border-color: #667eea;
        }

        .modal-cancel {
            margin-top: 12px;
            padding: 12px;
            width: 100%;
            background: none;
            border: none;
            color: #666;
            font-size: 0.9rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ホーム画面 -->
        <div id="home-screen">
            <div class="header">
                <h1>調理師試験 模擬問題</h1>
                <p>合格に向けて頑張りましょう！</p>
            </div>

            <div class="mode-selection">
                <button class="mode-btn" onclick="startExamMode()">
                    <div class="mode-icon exam">📝</div>
                    <div class="mode-info">
                        <h3>模擬試験モード</h3>
                        <p>本番と同じ60問・カテゴリ配分で出題</p>
                    </div>
                </button>

                <button class="mode-btn" onclick="showRandomModal()">
                    <div class="mode-icon random">🎲</div>
                    <div class="mode-info">
                        <h3>ランダムモード</h3>
                        <p>全カテゴリからランダムに出題</p>
                    </div>
                </button>

                <button class="mode-btn" onclick="startWeakMode()">
                    <div class="mode-icon weak">💪</div>
                    <div class="mode-info">
                        <h3>苦手克服モード</h3>
                        <p>間違えた問題を重点的に復習<span class="weak-count" id="weak-count">0</span></p>
                    </div>
                </button>
            </div>

            <!-- 学習統計 -->
            <div class="stats-section">
                <h3>📊 学習記録</h3>
                <div class="stat-row">
                    <span>総解答数</span>
                    <span id="stat-total">0</span>
                </div>
                <div class="stat-row">
                    <span>正解率</span>
                    <span id="stat-rate">-%</span>
                </div>
                <div class="stat-row">
                    <span>模擬試験回数</span>
                    <span id="stat-exams">0</span>
                </div>
                <button class="reset-btn" onclick="resetStats()">学習記録をリセット</button>
            </div>
        </div>

        <!-- 問題画面 -->
        <div id="quiz-screen" class="quiz-screen">
            <div class="quiz-header">
                <button class="back-btn" onclick="goHome()">←</button>
                <div class="progress-info" id="progress-info">1 / 10</div>
            </div>
            <span class="category-badge" id="category-badge">食品衛生学</span>
            <div class="question-card">
                <p class="question-text" id="question-text"></p>
                <div class="choices" id="choices"></div>
                <div class="explanation" id="explanation">
                    <h4>💡 解説</h4>
                    <p id="explanation-text"></p>
                </div>
            </div>
            <button class="next-btn" id="next-btn" onclick="nextQuestion()">次の問題</button>
        </div>

        <!-- 結果画面 -->
        <div id="result-screen" class="result-screen">
            <div class="result-card">
                <h2>試験結果</h2>
                <div class="result-score" id="result-score">0<span> / 60</span></div>
                <div class="result-detail" id="result-detail">正解率: 0%</div>
                <div class="result-pass" id="result-pass">合格</div>

                <div class="result-category">
                    <h4>カテゴリ別結果</h4>
                    <div id="category-results"></div>
                </div>
            </div>
            <button class="retry-btn" onclick="retryMode()">もう一度挑戦</button>
            <button class="home-btn" onclick="goHome()">ホームに戻る</button>
        </div>
    </div>

    <!-- 問題数選択モーダル -->
    <div class="modal-overlay" id="random-modal">
        <div class="modal">
            <h3>問題数を選択</h3>
            <div class="modal-options">
                <div class="modal-option" onclick="startRandomMode(10)">10問</div>
                <div class="modal-option" onclick="startRandomMode(20)">20問</div>
                <div class="modal-option" onclick="startRandomMode(30)">30問</div>
                <div class="modal-option" onclick="startRandomMode(0)">全問</div>
            </div>
            <button class="modal-cancel" onclick="closeModal()">キャンセル</button>
        </div>
    </div>

    <script>
    // ==========================================
    // 問題データ
    // ==========================================
    const questions = [
        // ===== 食品衛生学 (25%) =====
        {
            category: "食品衛生学",
            question: "食中毒の原因菌のうち、芽胞を形成するものはどれか。",
            choices: ["腸炎ビブリオ", "黄色ブドウ球菌", "ウェルシュ菌", "カンピロバクター"],
            answer: 2,
            explanation: "ウェルシュ菌は芽胞を形成する嫌気性菌で、加熱調理後の食品が徐々に冷却される過程で増殖しやすい。大量調理施設での食中毒の原因となることが多い。"
        },
        {
            category: "食品衛生学",
            question: "ノロウイルスに関する記述で正しいものはどれか。",
            choices: ["細菌性食中毒に分類される", "85～90℃で90秒以上の加熱が有効である", "アルコール消毒が最も有効である", "夏季に最も発生が多い"],
            answer: 1,
            explanation: "ノロウイルスはウイルス性食中毒の原因で、85～90℃で90秒以上の加熱が有効。次亜塩素酸ナトリウムによる消毒も効果的。冬季に多発する。"
        },
        {
            category: "食品衛生学",
            question: "腸炎ビブリオに関する記述で正しいものはどれか。",
            choices: ["真水中で増殖しやすい", "3%前後の食塩濃度で増殖する", "低温でも急速に増殖する", "芽胞を形成する"],
            answer: 1,
            explanation: "腸炎ビブリオは好塩菌で、3%前後の食塩濃度（海水程度）でよく増殖する。真水や低温では増殖しにくく、魚介類の生食が主な感染源。"
        },
        {
            category: "食品衛生学",
            question: "食品添加物の表示が免除されるものはどれか。",
            choices: ["保存料", "着色料", "加工助剤", "甘味料"],
            answer: 2,
            explanation: "加工助剤は食品の加工中に使用されるが、最終食品に残存しないか微量のため、表示が免除される。キャリーオーバーも同様に免除される場合がある。"
        },
        {
            category: "食品衛生学",
            question: "HACCPに関する記述で正しいものはどれか。",
            choices: ["最終製品の検査を重視するシステムである", "重要管理点（CCP）を設定して管理する", "小規模事業者には適用されない", "日本独自の衛生管理手法である"],
            answer: 1,
            explanation: "HACCP（危害分析重要管理点）は、製造工程全体の中で重要管理点（CCP）を設定し、継続的に監視・記録する予防的な衛生管理システム。2021年から全食品事業者に義務化。"
        },
        {
            category: "食品衛生学",
            question: "黄色ブドウ球菌の食中毒に関する記述で正しいものはどれか。",
            choices: ["毒素は加熱により容易に分解される", "潜伏期間は通常1～5時間と短い", "感染型食中毒に分類される", "食品中で増殖しても毒素は産生しない"],
            answer: 1,
            explanation: "黄色ブドウ球菌食中毒は毒素型で、潜伏期間が1～5時間と短い。産生されるエンテロトキシンは耐熱性があり、通常の加熱では分解されない。"
        },
        {
            category: "食品衛生学",
            question: "サルモネラ菌に関する記述で正しいものはどれか。",
            choices: ["ヒトの皮膚に常在する", "鶏卵が主な感染源の一つである", "嫌気性菌である", "毒素型食中毒を起こす"],
            answer: 1,
            explanation: "サルモネラ菌は鶏卵や食肉が主な感染源。感染型食中毒を起こし、十分な加熱（75℃1分以上）で予防できる。"
        },
        {
            category: "食品衛生学",
            question: "食品の保存方法とその原理の組み合わせで正しいものはどれか。",
            choices: ["塩蔵 ー 水分活性の低下", "冷凍 ー pHの低下", "燻製 ー 酸素濃度の上昇", "缶詰 ー 水分活性の上昇"],
            answer: 0,
            explanation: "塩蔵は食塩により食品の水分活性を低下させ、微生物の増殖を抑制する保存法。冷凍は低温による微生物活動の抑制、燻製は殺菌・乾燥効果による。"
        },
        {
            category: "食品衛生学",
            question: "アニサキスに関する記述で正しいものはどれか。",
            choices: ["加熱や冷凍では死滅しない", "淡水魚に多く寄生する", "酢や醤油で死滅する", "-20℃で24時間以上の冷凍で死滅する"],
            answer: 3,
            explanation: "アニサキスは-20℃で24時間以上の冷凍、または70℃以上の加熱で死滅する。海産魚介類に寄生し、酢や醤油では死滅しない。"
        },
        {
            category: "食品衛生学",
            question: "食品衛生法に基づく営業許可が必要な業種はどれか。",
            choices: ["野菜の露地販売", "飲食店営業", "農産物の直売", "米の販売"],
            answer: 1,
            explanation: "飲食店営業は食品衛生法に基づく営業許可が必要。都道府県知事の許可を受け、施設基準を満たす必要がある。"
        },
        {
            category: "食品衛生学",
            question: "消毒に関する記述で正しいものはどれか。",
            choices: ["逆性石けんはノロウイルスに有効である", "次亜塩素酸ナトリウムは金属の腐食を起こさない", "エタノールは芽胞に有効である", "次亜塩素酸ナトリウムはノロウイルスに有効である"],
            answer: 3,
            explanation: "次亜塩素酸ナトリウム（200ppm以上）はノロウイルスに有効。アルコールや逆性石けんはノロウイルスには効果が不十分。"
        },
        {
            category: "食品衛生学",
            question: "食品中の残留農薬に関するポジティブリスト制度について正しいものはどれか。",
            choices: ["基準が設定されていない農薬は使用制限がない", "一律基準は0.01ppmである", "輸入食品には適用されない", "天然由来の農薬は対象外である"],
            answer: 1,
            explanation: "ポジティブリスト制度では、基準が設定されていない農薬等は一律基準（0.01ppm）を超えて残留する食品の販売等が禁止される。"
        },
        {
            category: "食品衛生学",
            question: "カンピロバクターによる食中毒に関する記述で正しいものはどれか。",
            choices: ["潜伏期間は1～2時間である", "鶏肉が主な原因食品である", "100個以上の菌量で発症する", "毒素型食中毒である"],
            answer: 1,
            explanation: "カンピロバクターは鶏肉が主な感染源で、少量の菌（数百個程度）でも感染する。潜伏期間は2～5日と比較的長い感染型食中毒。"
        },
        {

            choices: ["スイカに塩をかけると甘味が弱まる", "だし汁のうま味の相乗効果は対比効果である", "少量の塩は甘味を強める対比効果がある", "コーヒーに砂糖を加えると苦味の抑制効果はない"],
            answer: 2,

            choices: ["緩慢冷凍の方が品質が良い", "急速冷凍は氷結晶が小さく品質が良い", "解凍は高温で急速に行うのが最適である", "冷凍食品は栄養価がすべて失われる"],
            answer: 1,
            explanation: "急速冷凍は食品内の氷結晶が小さく均一になるため、細胞の破壊が少なく品質が保持される。緩慢冷凍は大きな氷結晶ができ品質が低下する。"
        },
        {
            category: "調理理論",
            question: "寒天とゼラチンの比較で正しいものはどれか。",
            choices: ["寒天は動物性、ゼラチンは植物性である", "ゼラチンは寒天より高い温度で固まる", "寒天のゲルは弾力が強い", "寒天は常温で固まり、ゼラチンは冷蔵が必要である"],
            answer: 3,
            explanation: "寒天は40℃以下で固まるため常温で凝固するが、ゼラチンは20℃以下で固まるため冷蔵が必要。寒天は海藻由来、ゼラチンは動物由来。"
        },
        {
            category: "調理理論",
            question: "塩の調理効果として正しいものはどれか。",
            choices: ["グルテンの形成を抑制する", "野菜の浸透圧により脱水作用がある", "魚の身を柔らかくする", "たんぱく質の凝固を抑制する"],
            answer: 1,
            explanation: "塩は浸透圧の作用で野菜の細胞から水分を引き出す（脱水作用）。漬物や塩もみはこの作用を利用している。また、魚の身を締める効果もある。"
        },

        // ===== 食文化概論 (10%) =====
        {

            choices: ["向付（むこうづけ）", "煮物", "飯", "焼き物"],
            answer: 2,
            explanation: "一汁三菜の三菜は「向付（刺身等）」「煮物」「焼き物」の三品。飯と汁は別に数える。日本料理の基本的な献立構成。"
        },
        {

            choices: ["スープ", "前菜（オードブル）", "魚料理", "肉料理"],
            answer: 1,
            explanation: "西洋料理のフルコースは前菜（オードブル）→スープ→魚料理→肉料理→サラダ→デザートの順で提供される。"
        },
        {
            category: "食文化概論",
            question: "中国料理の四大料理に含まれないものはどれか。",
            choices: ["北京料理", "四川料理", "上海料理", "台湾料理"],
            answer: 3,
            explanation: "中国の四大料理は北京料理、上海料理、四川料理、広東料理。それぞれ地域の気候・風土を反映した特色がある。"
        },
        {
            category: "食文化概論",
            question: "日本の行事食の組み合わせで正しいものはどれか。",
            choices: ["正月 ー ちまき", "端午の節句 ー 柏餅", "七夕 ー おはぎ", "土用の丑の日 ー そば"],
            answer: 1,
            explanation: "端午の節句（5月5日）には柏餅やちまきを食べる習慣がある。正月はおせち料理・雑煮、土用の丑の日はうなぎが代表的。"
        },
        {
            category: "食文化概論",
            question: "日本料理の調味の基本「さしすせそ」の「せ」に該当するものはどれか。",
            choices: ["セロリ", "醤油", "石灰", "ゼラチン"],
            answer: 1,
            explanation: "さしすせそは砂糖（さ）、塩（し）、酢（す）、醤油（せ）、味噌（そ）。この順序で調味すると味がよく浸透する。"
        },
        {
            category: "食文化概論",
            question: "郷土料理とその地域の組み合わせで正しいものはどれか。",
            choices: ["きりたんぽ ー 山形県", "ほうとう ー 山梨県", "讃岐うどん ー 愛媛県", "もんじゃ焼き ー 大阪府"],
            answer: 1,
            explanation: "ほうとうは山梨県の郷土料理で、幅広の麺を野菜と味噌で煮込む。きりたんぽは秋田県、讃岐うどんは香川県、もんじゃ焼きは東京都の名物。"
        }
    ];

    // ==========================================
    // アプリケーション状態管理
    // ==========================================
    let currentMode = null;
    let currentQuestions = [];
    let currentIndex = 0;
    let correctCount = 0;
    let categoryResults = {};
    let answered = false;

    // カテゴリ別出題配分（模擬試験モード: 60問）
    const EXAM_DISTRIBUTION = {
        "食品衛生学": 15,
        "公衆衛生学": 9,
        "栄養学": 9,
        "食品学": 6,
        "調理理論": 15,
        "食文化概論": 6
    };

    // ==========================================
    // LocalStorage管理
    // ==========================================
    function getStats() {
        const stats = localStorage.getItem('chorishi_stats');
        return stats ? JSON.parse(stats) : { total: 0, correct: 0, exams: 0 };
    }

    function saveStats(stats) {
        localStorage.setItem('chorishi_stats', JSON.stringify(stats));
    }

    function getWeakQuestions() {
        const weak = localStorage.getItem('chorishi_weak');
        return weak ? JSON.parse(weak) : [];
    }

    function saveWeakQuestions(weak) {
        localStorage.setItem('chorishi_weak', JSON.stringify(weak));
    }

    function addWeakQuestion(questionIndex) {
        let weak = getWeakQuestions();
        if (!weak.includes(questionIndex)) {
            weak.push(questionIndex);
            saveWeakQuestions(weak);
        }
    }

    function removeWeakQuestion(questionIndex) {
        let weak = getWeakQuestions();
        weak = weak.filter(i => i !== questionIndex);
        saveWeakQuestions(weak);
    }

    function resetStats() {
        if (confirm('学習記録をすべてリセットしますか？')) {
            localStorage.removeItem('chorishi_stats');
            localStorage.removeItem('chorishi_weak');
            updateStatsDisplay();
            updateWeakCount();
        }
    }

    // ==========================================
    // 表示更新
    // ==========================================
    function updateStatsDisplay() {
        const stats = getStats();
        document.getElementById('stat-total').textContent = stats.total;
        document.getElementById('stat-rate').textContent = stats.total > 0
            ? Math.round(stats.correct / stats.total * 100) + '%'
            : '-%';
        document.getElementById('stat-exams').textContent = stats.exams;
    }

    function updateWeakCount() {
        const weak = getWeakQuestions();
        document.getElementById('weak-count').textContent = weak.length;
    }

    // ==========================================
    // モード開始
    // ==========================================
    function startExamMode() {
        currentMode = 'exam';
        currentQuestions = [];
        categoryResults = {};

        // カテゴリ配分に従って問題を選択
        for (const [category, count] of Object.entries(EXAM_DISTRIBUTION)) {
            const categoryQuestions = questions
                .map((q, i) => ({ ...q, originalIndex: i }))
                .filter(q => q.category === category);
            const shuffled = shuffle([...categoryQuestions]);
            const selected = shuffled.slice(0, Math.min(count, shuffled.length));
            currentQuestions.push(...selected);
            categoryResults[category] = { total: selected.length, correct: 0 };
        }

        // 全体をシャッフル
        currentQuestions = shuffle(currentQuestions);
        currentIndex = 0;
        correctCount = 0;
        showQuizScreen();
    }

    function showRandomModal() {
        document.getElementById('random-modal').classList.add('show');
    }

    function closeModal() {
        document.getElementById('random-modal').classList.remove('show');
    }

    function startRandomMode(count) {
        closeModal();
        currentMode = 'random';
        categoryResults = {};

        let allQuestions = questions.map((q, i) => ({ ...q, originalIndex: i }));
        allQuestions = shuffle(allQuestions);

        if (count > 0) {
            currentQuestions = allQuestions.slice(0, count);
        } else {
            currentQuestions = allQuestions;
        }

        // カテゴリ結果を初期化
        currentQuestions.forEach(q => {
            if (!categoryResults[q.category]) {
                categoryResults[q.category] = { total: 0, correct: 0 };
            }
            categoryResults[q.category].total++;
        });

        currentIndex = 0;
        correctCount = 0;
        showQuizScreen();
    }

    function startWeakMode() {
        const weakIndices = getWeakQuestions();
        if (weakIndices.length === 0) {
            alert('苦手な問題はまだありません。\n問題を解いて間違えた問題が記録されます。');
            return;
        }

        currentMode = 'weak';
        categoryResults = {};
        currentQuestions = shuffle(weakIndices.map(i => ({ ...questions[i], originalIndex: i })));

        currentQuestions.forEach(q => {
            if (!categoryResults[q.category]) {
                categoryResults[q.category] = { total: 0, correct: 0 };
            }
            categoryResults[q.category].total++;
        });

        currentIndex = 0;
        correctCount = 0;
        showQuizScreen();
    }

    // ==========================================
    // 問題表示
    // ==========================================
    function showQuizScreen() {
        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        document.getElementById('result-screen').style.display = 'none';
        showQuestion();
    }

    function showQuestion() {
        answered = false;
        const q = currentQuestions[currentIndex];

        document.getElementById('progress-info').textContent =
            `${currentIndex + 1} / ${currentQuestions.length}`;
        document.getElementById('category-badge').textContent = q.category;
        document.getElementById('question-text').textContent = q.question;
        document.getElementById('explanation').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';

        const choicesEl = document.getElementById('choices');
        choicesEl.innerHTML = '';

        q.choices.forEach((choice, i) => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            btn.textContent = `${i + 1}. ${choice}`;
            btn.onclick = () => selectAnswer(i);
            choicesEl.appendChild(btn);
        });
    }

    function selectAnswer(selectedIndex) {
        if (answered) return;
        answered = true;

        const q = currentQuestions[currentIndex];
        const isCorrect = selectedIndex === q.answer;
        const buttons = document.querySelectorAll('.choice-btn');

        // 統計更新
        const stats = getStats();
        stats.total++;
        if (isCorrect) {
            stats.correct++;
            correctCount++;
            categoryResults[q.category].correct++;
            // 苦手リストから削除（正解した場合）
            if (currentMode === 'weak') {
                removeWeakQuestion(q.originalIndex);
            }
        } else {
            // 苦手リストに追加
            addWeakQuestion(q.originalIndex);
        }
        saveStats(stats);

        // ボタンの色を変更
        buttons.forEach((btn, i) => {
            btn.disabled = true;
            if (i === q.answer) {
                btn.classList.add('correct');
            } else if (i === selectedIndex && !isCorrect) {
                btn.classList.add('incorrect');
            }
            if (i === q.answer && !isCorrect) {
                btn.classList.add('show-correct');
            }
        });

        // 解説表示
        document.getElementById('explanation').style.display = 'block';
        document.getElementById('explanation-text').textContent = q.explanation;

        // 次へボタン表示
        const nextBtn = document.getElementById('next-btn');
        nextBtn.style.display = 'block';
        nextBtn.textContent = currentIndex < currentQuestions.length - 1 ? '次の問題' : '結果を見る';
    }

    function nextQuestion() {
        currentIndex++;
        if (currentIndex < currentQuestions.length) {
            showQuestion();
            // スクロールを上に戻す
            window.scrollTo(0, 0);
        } else {
            showResult();
        }
    }

    // ==========================================
    // 結果表示
    // ==========================================
    function showResult() {
        // 模擬試験の場合は回数をカウント
        if (currentMode === 'exam') {
            const stats = getStats();
            stats.exams++;
            saveStats(stats);
        }

        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';

        const total = currentQuestions.length;
        const rate = Math.round(correctCount / total * 100);

        document.getElementById('result-score').innerHTML = `${correctCount}<span> / ${total}</span>`;
        document.getElementById('result-detail').textContent = `正解率: ${rate}%`;

        const passEl = document.getElementById('result-pass');
        if (rate >= 60) {
            passEl.textContent = '🎉 合格ライン達成！';
            passEl.className = 'result-pass pass';
        } else {
            passEl.textContent = '📚 もう少し頑張りましょう';
            passEl.className = 'result-pass fail';
        }

        // カテゴリ別結果
        const categoryResultsEl = document.getElementById('category-results');
        categoryResultsEl.innerHTML = '';

        for (const [category, result] of Object.entries(categoryResults)) {
            const catRate = result.total > 0 ? Math.round(result.correct / result.total * 100) : 0;
            const color = catRate >= 60 ? '#4caf50' : '#ff5252';

            categoryResultsEl.innerHTML += `
                <div class="category-result-item">
                    <span>${category}</span>
                    <div style="display:flex;align-items:center;gap:8px;">
                        <span>${result.correct}/${result.total}</span>
                        <div class="bar-wrapper">
                            <div class="bar-fill" style="width:${catRate}%;background:${color};"></div>
                        </div>
                    </div>
                </div>
            `;
        }

        updateStatsDisplay();
        updateWeakCount();
    }

    // ==========================================
    // ナビゲーション
    // ==========================================
    function goHome() {
        document.getElementById('home-screen').style.display = 'block';
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'none';
        updateStatsDisplay();
        updateWeakCount();
        window.scrollTo(0, 0);
    }

    function retryMode() {
        if (currentMode === 'exam') {
            startExamMode();
        } else if (currentMode === 'random') {
            startRandomMode(currentQuestions.length);
        } else if (currentMode === 'weak') {
            startWeakMode();
        }
    }

    // ==========================================
    // ユーティリティ
    // ==========================================
    function shuffle(array) {
        const arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // 初期化
    updateStatsDisplay();
    updateWeakCount();
    </script>
</body>
</html>
