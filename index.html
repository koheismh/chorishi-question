<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>調理師試験 模擬問題</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            background: #f5f5f5; color: #333; min-height: 100vh;
            -webkit-text-size-adjust: 100%;
        }
        .container { max-width: 600px; margin: 0 auto; padding: 16px; }

        /* ヘッダー */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; padding: 20px 16px; text-align: center;
            border-radius: 12px; margin-bottom: 16px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        .header h1 { font-size: 1.4rem; margin-bottom: 4px; }
        .header p { font-size: 0.85rem; opacity: 0.9; }

        /* タブ */
        .tab-container {
            display: flex; background: white; border-radius: 12px;
            margin-bottom: 16px; overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .tab-btn {
            flex: 1; padding: 14px 8px; border: none; background: white;
            font-size: 0.9rem; font-weight: 600; cursor: pointer;
            color: #999; transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .tab-btn.active {
            color: #667eea; border-bottom: 3px solid #667eea; background: #f8f8ff;
        }

        /* モード選択 */
        .mode-selection { display: flex; flex-direction: column; gap: 14px; }
        .mode-btn {
            display: flex; align-items: center; gap: 14px;
            background: white; border: none; border-radius: 12px;
            padding: 20px; text-align: left; cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: transform 0.15s, box-shadow 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .mode-btn:active { transform: scale(0.98); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .mode-icon {
            font-size: 2rem; width: 50px; height: 50px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 12px; flex-shrink: 0;
        }
        .mode-icon.random { background: #e3f2fd; }
        .mode-icon.weak { background: #fce4ec; }
        .mode-icon.exam { background: #e8f5e9; }
        .mode-info h3 { font-size: 1.05rem; margin-bottom: 4px; }
        .mode-info p { font-size: 0.8rem; color: #666; }
        .weak-count {
            background: #ff5252; color: white; font-size: 0.7rem;
            padding: 2px 8px; border-radius: 10px; margin-left: 8px;
        }

        /* 問題画面 */
        .quiz-screen { display: none; }
        .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .back-btn {
            background: none; border: none; font-size: 1.5rem;
            cursor: pointer; padding: 8px; border-radius: 8px;
            -webkit-tap-highlight-color: transparent;
        }
        .back-btn:active { background: #eee; }
        .progress-info { font-size: 0.85rem; color: #666; }
        .category-badge {
            display: inline-block; background: #667eea; color: white;
            font-size: 0.75rem; padding: 4px 10px; border-radius: 20px; margin-bottom: 12px;
        }
        .question-card {
            background: white; border-radius: 12px; padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 16px;
        }
        .question-text { font-size: 1rem; line-height: 1.7; margin-bottom: 20px; font-weight: 500; white-space: pre-line; }
        .choices { display: flex; flex-direction: column; gap: 10px; }
        .choice-btn {
            display: block; width: 100%; text-align: left;
            background: #f8f9fa; border: 2px solid #e9ecef; border-radius: 10px;
            padding: 14px 16px; font-size: 0.95rem; line-height: 1.5;
            cursor: pointer; transition: border-color 0.2s, background 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .choice-btn:active { background: #e9ecef; }
        .choice-btn.selected { border-color: #667eea; background: #f0f0ff; }
        .choice-btn.correct { border-color: #4caf50; background: #e8f5e9; }
        .choice-btn.incorrect { border-color: #f44336; background: #ffebee; }
        .choice-btn.show-correct { border-color: #4caf50; background: #e8f5e9; }
        .choice-btn:disabled { cursor: default; }

        /* 解説 */
        .explanation {
            display: none; background: #fffde7; border: 1px solid #fff9c4;
            border-radius: 10px; padding: 16px; margin-top: 16px;
        }
        .explanation h4 { font-size: 0.85rem; color: #f57f17; margin-bottom: 8px; }
        .explanation p { font-size: 0.9rem; line-height: 1.6; }

        /* ボタン */
        .next-btn {
            display: none; width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 10px; padding: 16px;
            font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 16px;
            -webkit-tap-highlight-color: transparent;
        }
        .next-btn:active { opacity: 0.9; }

        /* 結果画面 */
        .result-screen { display: none; text-align: center; }
        .result-card {
            background: white; border-radius: 12px; padding: 30px 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 20px;
        }
        .result-score { font-size: 3rem; font-weight: 700; color: #667eea; margin: 16px 0; }
        .result-score span { font-size: 1.2rem; color: #666; }
        .result-detail { font-size: 0.9rem; color: #666; margin-bottom: 8px; }
        .result-pass { display: inline-block; padding: 8px 20px; border-radius: 20px; font-weight: 600; margin-top: 12px; }
        .result-pass.pass { background: #e8f5e9; color: #2e7d32; }
        .result-pass.fail { background: #ffebee; color: #c62828; }
        .result-category { text-align: left; margin-top: 20px; }
        .result-category h4 { font-size: 0.9rem; margin-bottom: 10px; color: #333; }
        .category-result-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0; border-bottom: 1px solid #f0f0f0; font-size: 0.85rem;
        }
        .category-result-item .bar-wrapper {
            width: 100px; height: 6px; background: #e0e0e0;
            border-radius: 3px; overflow: hidden; margin-left: 10px;
        }
        .category-result-item .bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
        .retry-btn, .home-btn {
            width: 100%; padding: 16px; border: none; border-radius: 10px;
            font-size: 1rem; font-weight: 600; cursor: pointer; margin-bottom: 10px;
            -webkit-tap-highlight-color: transparent;
        }
        .retry-btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .home-btn { background: white; color: #333; border: 2px solid #e0e0e0; }

        /* 統計 */
        .stats-section {
            margin-top: 20px; background: white; border-radius: 12px;
            padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .stats-section h3 { font-size: 0.9rem; margin-bottom: 12px; color: #333; }
        .stat-row {
            display: flex; justify-content: space-between; padding: 8px 0;
            font-size: 0.85rem; border-bottom: 1px solid #f5f5f5;
        }
        .stat-row:last-child { border-bottom: none; }
        .reset-btn {
            display: block; width: 100%; margin-top: 16px; padding: 12px;
            background: #ffebee; color: #c62828; border: none; border-radius: 8px;
            font-size: 0.85rem; cursor: pointer; -webkit-tap-highlight-color: transparent;
        }

        /* モーダル */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal { background: white; border-radius: 16px; padding: 24px; width: 90%; max-width: 340px; }
        .modal h3 { text-align: center; margin-bottom: 16px; }
        .modal-options { display: flex; flex-direction: column; gap: 10px; }
        .modal-option {
            padding: 14px; border: 2px solid #e0e0e0; border-radius: 10px;
            text-align: center; cursor: pointer; font-size: 1rem;
            -webkit-tap-highlight-color: transparent;
        }
        .modal-option:active { background: #f0f0ff; border-color: #667eea; }
        .modal-cancel {
            margin-top: 12px; padding: 12px; width: 100%;
            background: none; border: none; color: #666; font-size: 0.9rem; cursor: pointer;
        }

        /* ローディング */
        .loading { text-align: center; padding: 40px; color: #666; }
        .loading::after { content: '読み込み中...'; }
    </style>
</head>
<body>
    <div class="container">
        <!-- ホーム画面 -->
        <div id="home-screen">
            <div class="header">
                <h1>調理師試験 模擬問題</h1>
                <p>合格に向けて頑張りましょう！</p>
            </div>

            <!-- タブ -->
            <div class="tab-container">
                <button class="tab-btn active" onclick="switchTab('basic')">基礎固め</button>
                <button class="tab-btn" onclick="switchTab('exam')">テスト対策</button>
            </div>

            <!-- 基礎固めモード -->
            <div id="tab-basic" class="mode-selection">
                <button class="mode-btn" onclick="showRandomModal('basic')">
                    <div class="mode-icon random">🎲</div>
                    <div class="mode-info">
                        <h3>ランダムモード</h3>
                        <p>シンプルな問題で知識を定着</p>
                    </div>
                </button>
                <button class="mode-btn" onclick="startWeakMode('basic')">
                    <div class="mode-icon weak">💪</div>
                    <div class="mode-info">
                        <h3>苦手克服モード</h3>
                        <p>間違えた問題を重点的に復習<span class="weak-count" id="weak-count-basic">0</span></p>
                    </div>
                </button>
            </div>

            <!-- テスト対策モード -->
            <div id="tab-exam" class="mode-selection" style="display:none;">
                <button class="mode-btn" onclick="startExamMode()">
                    <div class="mode-icon exam">📝</div>
                    <div class="mode-info">
                        <h3>模擬試験モード</h3>
                        <p>本番と同じ60問・カテゴリ配分で出題</p>
                    </div>
                </button>
                <button class="mode-btn" onclick="showRandomModal('exam')">
                    <div class="mode-icon random">🎲</div>
                    <div class="mode-info">
                        <h3>ランダムモード</h3>
                        <p>本番形式の問題でテスト対策</p>
                    </div>
                </button>
                <button class="mode-btn" onclick="startWeakMode('exam')">
                    <div class="mode-icon weak">💪</div>
                    <div class="mode-info">
                        <h3>苦手克服モード</h3>
                        <p>間違えた問題を重点的に復習<span class="weak-count" id="weak-count-exam">0</span></p>
                    </div>
                </button>
            </div>

            <!-- 学習統計 -->
            <div class="stats-section">
                <h3>📊 学習記録</h3>
                <div class="stat-row"><span>基礎 - 総解答数</span><span id="stat-basic-total">0</span></div>
                <div class="stat-row"><span>基礎 - 正解率</span><span id="stat-basic-rate">-%</span></div>
                <div class="stat-row"><span>テスト - 総解答数</span><span id="stat-exam-total">0</span></div>
                <div class="stat-row"><span>テスト - 正解率</span><span id="stat-exam-rate">-%</span></div>
                <div class="stat-row"><span>模擬試験回数</span><span id="stat-exams">0</span></div>
                <button class="reset-btn" onclick="resetStats()">学習記録をリセット</button>
            </div>
        </div>

        <!-- 問題画面 -->
        <div id="quiz-screen" class="quiz-screen">
            <div class="quiz-header">
                <button class="back-btn" onclick="goHome()">←</button>
                <div class="progress-info" id="progress-info">1 / 10</div>
            </div>
            <span class="category-badge" id="category-badge">食品衛生学</span>
            <div class="question-card">
                <p class="question-text" id="question-text"></p>
                <div class="choices" id="choices"></div>
                <div class="explanation" id="explanation">
                    <h4>💡 解説</h4>
                    <p id="explanation-text"></p>
                </div>
            </div>
            <button class="next-btn" id="next-btn" onclick="nextQuestion()">次の問題</button>
        </div>

        <!-- 結果画面 -->
        <div id="result-screen" class="result-screen">
            <div class="result-card">
                <h2>試験結果</h2>
                <div class="result-score" id="result-score">0<span> / 60</span></div>
                <div class="result-detail" id="result-detail">正解率: 0%</div>
                <div class="result-pass" id="result-pass">合格</div>
                <div class="result-category">
                    <h4>カテゴリ別結果</h4>
                    <div id="category-results"></div>
                </div>
            </div>
            <button class="retry-btn" onclick="retryMode()">もう一度挑戦</button>
            <button class="home-btn" onclick="goHome()">ホームに戻る</button>
        </div>
    </div>

    <!-- 問題数選択モーダル -->
    <div class="modal-overlay" id="random-modal">
        <div class="modal">
            <h3>問題数を選択</h3>
            <div class="modal-options">
                <div class="modal-option" onclick="startRandomMode(10)">10問</div>
                <div class="modal-option" onclick="startRandomMode(20)">20問</div>
                <div class="modal-option" onclick="startRandomMode(30)">30問</div>
                <div class="modal-option" onclick="startRandomMode(0)">全問</div>
            </div>
            <button class="modal-cancel" onclick="closeModal()">キャンセル</button>
        </div>
    </div>

    <script>
    // ==========================================
    // 状態管理
    // ==========================================
    let allQuestions = [];
    let currentTab = 'basic'; // 'basic' or 'exam'
    let currentMode = null;
    let currentLevel = null; // 'basic' or 'exam'
    let currentQuestions = [];
    let currentIndex = 0;
    let correctCount = 0;
    let categoryResults = {};
    let answered = false;
    let randomModalLevel = 'basic';

    const EXAM_DISTRIBUTION = {
        "食品衛生学": 15, "公衆衛生学": 9, "栄養学": 9,
        "食品学": 6, "調理理論": 15, "食文化概論": 6
    };

    // ==========================================
    // データ読み込み
    // ==========================================
    async function loadQuestions() {
        try {
            const response = await fetch('questions.json');
            allQuestions = await response.json();
            updateStatsDisplay();
            updateWeakCounts();
        } catch (e) {
            console.error('問題データの読み込みに失敗:', e);
            alert('問題データの読み込みに失敗しました。questions.jsonが同じフォルダにあることを確認してください。');
        }
    }

    // ==========================================
    // タブ切り替え
    // ==========================================
    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('tab-basic').style.display = tab === 'basic' ? 'flex' : 'none';
        document.getElementById('tab-exam').style.display = tab === 'exam' ? 'flex' : 'none';
    }

    // ==========================================
    // LocalStorage管理
    // ==========================================
    function getStats() {
        const stats = localStorage.getItem('chorishi_stats_v2');
        return stats ? JSON.parse(stats) : {
            basic: { total: 0, correct: 0 },
            exam: { total: 0, correct: 0 },
            exams: 0
        };
    }
    function saveStats(stats) { localStorage.setItem('chorishi_stats_v2', JSON.stringify(stats)); }

    function getWeakQuestions(level) {
        const weak = localStorage.getItem('chorishi_weak_' + level);
        return weak ? JSON.parse(weak) : [];
    }
    function saveWeakQuestions(level, weak) { localStorage.setItem('chorishi_weak_' + level, JSON.stringify(weak)); }

    function addWeakQuestion(level, questionId) {
        let weak = getWeakQuestions(level);
        if (!weak.includes(questionId)) { weak.push(questionId); saveWeakQuestions(level, weak); }
    }
    function removeWeakQuestion(level, questionId) {
        let weak = getWeakQuestions(level);
        weak = weak.filter(id => id !== questionId);
        saveWeakQuestions(level, weak);
    }

    function resetStats() {
        if (confirm('学習記録をすべてリセットしますか？')) {
            localStorage.removeItem('chorishi_stats_v2');
            localStorage.removeItem('chorishi_weak_basic');
            localStorage.removeItem('chorishi_weak_exam');
            updateStatsDisplay();
            updateWeakCounts();
        }
    }

    // ==========================================
    // 表示更新
    // ==========================================
    function updateStatsDisplay() {
        const stats = getStats();
        document.getElementById('stat-basic-total').textContent = stats.basic.total;
        document.getElementById('stat-basic-rate').textContent = stats.basic.total > 0
            ? Math.round(stats.basic.correct / stats.basic.total * 100) + '%' : '-%';
        document.getElementById('stat-exam-total').textContent = stats.exam.total;
        document.getElementById('stat-exam-rate').textContent = stats.exam.total > 0
            ? Math.round(stats.exam.correct / stats.exam.total * 100) + '%' : '-%';
        document.getElementById('stat-exams').textContent = stats.exams;
    }

    function updateWeakCounts() {
        document.getElementById('weak-count-basic').textContent = getWeakQuestions('basic').length;
        document.getElementById('weak-count-exam').textContent = getWeakQuestions('exam').length;
    }

    // ==========================================
    // モード開始
    // ==========================================
    function startExamMode() {
        currentMode = 'exam-mode';
        currentLevel = 'exam';
        currentQuestions = [];
        categoryResults = {};

        for (const [category, count] of Object.entries(EXAM_DISTRIBUTION)) {
            const categoryQs = allQuestions.filter(q => q.category === category);
            const shuffled = shuffle([...categoryQs]);
            const selected = shuffled.slice(0, Math.min(count, shuffled.length));
            selected.forEach(q => {
                currentQuestions.push({ ...q.exam, id: q.id, category: q.category, explanation: q.explanation });
            });
            categoryResults[category] = { total: selected.length, correct: 0 };
        }

        currentQuestions = shuffle(currentQuestions);
        currentIndex = 0;
        correctCount = 0;
        showQuizScreen();
    }

    function showRandomModal(level) {
        randomModalLevel = level;
        document.getElementById('random-modal').classList.add('show');
    }

    function closeModal() { document.getElementById('random-modal').classList.remove('show'); }

    function startRandomMode(count) {
        closeModal();
        currentMode = 'random';
        currentLevel = randomModalLevel;
        categoryResults = {};

        let pool = allQuestions.map(q => ({
            ...q[currentLevel], id: q.id, category: q.category, explanation: q.explanation
        }));
        pool = shuffle(pool);

        if (count > 0) { currentQuestions = pool.slice(0, count); }
        else { currentQuestions = pool; }

        currentQuestions.forEach(q => {
            if (!categoryResults[q.category]) categoryResults[q.category] = { total: 0, correct: 0 };
            categoryResults[q.category].total++;
        });

        currentIndex = 0;
        correctCount = 0;
        showQuizScreen();
    }

    function startWeakMode(level) {
        const weakIds = getWeakQuestions(level);
        if (weakIds.length === 0) {
            alert('苦手な問題はまだありません。\n問題を解いて間違えた問題が記録されます。');
            return;
        }

        currentMode = 'weak';
        currentLevel = level;
        categoryResults = {};

        currentQuestions = shuffle(weakIds.map(id => {
            const q = allQuestions.find(item => item.id === id);
            if (!q) return null;
            return { ...q[level], id: q.id, category: q.category, explanation: q.explanation };
        }).filter(q => q !== null));

        currentQuestions.forEach(q => {
            if (!categoryResults[q.category]) categoryResults[q.category] = { total: 0, correct: 0 };
            categoryResults[q.category].total++;
        });

        currentIndex = 0;
        correctCount = 0;
        showQuizScreen();
    }

    // ==========================================
    // 問題表示
    // ==========================================
    function showQuizScreen() {
        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        document.getElementById('result-screen').style.display = 'none';
        showQuestion();
    }

    function showQuestion() {
        answered = false;
        const q = currentQuestions[currentIndex];

        document.getElementById('progress-info').textContent = `${currentIndex + 1} / ${currentQuestions.length}`;
        document.getElementById('category-badge').textContent = q.category;
        document.getElementById('question-text').textContent = q.question;
        document.getElementById('explanation').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';

        const choicesEl = document.getElementById('choices');
        choicesEl.innerHTML = '';

        q.choices.forEach((choice, i) => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            btn.textContent = `${i + 1}. ${choice}`;
            btn.onclick = () => selectAnswer(i);
            choicesEl.appendChild(btn);
        });
    }

    function selectAnswer(selectedIndex) {
        if (answered) return;
        answered = true;

        const q = currentQuestions[currentIndex];
        const isCorrect = selectedIndex === q.answer;
        const buttons = document.querySelectorAll('.choice-btn');

        const stats = getStats();
        stats[currentLevel].total++;
        if (isCorrect) {
            stats[currentLevel].correct++;
            correctCount++;
            categoryResults[q.category].correct++;
            if (currentMode === 'weak') removeWeakQuestion(currentLevel, q.id);
        } else {
            addWeakQuestion(currentLevel, q.id);
        }
        saveStats(stats);

        buttons.forEach((btn, i) => {
            btn.disabled = true;
            if (i === q.answer) btn.classList.add('correct');
            else if (i === selectedIndex && !isCorrect) btn.classList.add('incorrect');
        });

        document.getElementById('explanation').style.display = 'block';
        document.getElementById('explanation-text').textContent = q.explanation;

        const nextBtn = document.getElementById('next-btn');
        nextBtn.style.display = 'block';
        nextBtn.textContent = currentIndex < currentQuestions.length - 1 ? '次の問題' : '結果を見る';
    }

    function nextQuestion() {
        currentIndex++;
        if (currentIndex < currentQuestions.length) {
            showQuestion();
            window.scrollTo(0, 0);
        } else {
            showResult();
        }
    }

    // ==========================================
    // 結果表示
    // ==========================================
    function showResult() {
        if (currentMode === 'exam-mode') {
            const stats = getStats();
            stats.exams++;
            saveStats(stats);
        }

        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';

        const total = currentQuestions.length;
        const rate = Math.round(correctCount / total * 100);

        document.getElementById('result-score').innerHTML = `${correctCount}<span> / ${total}</span>`;
        document.getElementById('result-detail').textContent = `正解率: ${rate}%`;

        const passEl = document.getElementById('result-pass');
        if (rate >= 60) {
            passEl.textContent = '🎉 合格ライン達成！';
            passEl.className = 'result-pass pass';
        } else {
            passEl.textContent = '📚 もう少し頑張りましょう';
            passEl.className = 'result-pass fail';
        }

        const categoryResultsEl = document.getElementById('category-results');
        categoryResultsEl.innerHTML = '';
        for (const [category, result] of Object.entries(categoryResults)) {
            const catRate = result.total > 0 ? Math.round(result.correct / result.total * 100) : 0;
            const color = catRate >= 60 ? '#4caf50' : '#ff5252';
            categoryResultsEl.innerHTML += `
                <div class="category-result-item">
                    <span>${category}</span>
                    <div style="display:flex;align-items:center;gap:8px;">
                        <span>${result.correct}/${result.total}</span>
                        <div class="bar-wrapper">
                            <div class="bar-fill" style="width:${catRate}%;background:${color};"></div>
                        </div>
                    </div>
                </div>`;
        }

        updateStatsDisplay();
        updateWeakCounts();
    }

    // ==========================================
    // ナビゲーション
    // ==========================================
    function goHome() {
        document.getElementById('home-screen').style.display = 'block';
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'none';
        updateStatsDisplay();
        updateWeakCounts();
        window.scrollTo(0, 0);
    }

    function retryMode() {
        if (currentMode === 'exam-mode') startExamMode();
        else if (currentMode === 'random') startRandomMode(currentQuestions.length);
        else if (currentMode === 'weak') startWeakMode(currentLevel);
    }

    // ==========================================
    // ユーティリティ
    // ==========================================
    function shuffle(array) {
        const arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // 初期化
    loadQuestions();
    </script>
</body>
</html>
